name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - uses: cachix/cachix-action@v17
        with:
          name: yuanwang-wf
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Create epubs directory
        run: mkdir -p epubs

      - name: Generate Emacs manual EPUB
        run: nix develop --command emacs-manual-to-epub epubs/emacs-manual.epub

      - name: Generate Elisp manual EPUB
        run: nix develop --command elisp-manual-to-epub epubs/elisp-manual.epub

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epubs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPUB manuals"
            git pull --rebase --autostash
            git push
          fi
